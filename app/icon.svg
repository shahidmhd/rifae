<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#f5c518"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140406"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Film sprocket holes — top row -->
  <rect x="2.5" y="2.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.7"/>
  <rect x="7.5" y="2.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.45"/>
  <rect x="21.5" y="2.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.45"/>
  <rect x="26.5" y="2.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.7"/>

  <!-- Film sprocket holes — bottom row -->
  <rect x="2.5" y="26.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.7"/>
  <rect x="7.5" y="26.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.45"/>
  <rect x="21.5" y="26.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.45"/>
  <rect x="26.5" y="26.5" width="3" height="3" rx="0.7" fill="#e50914" opacity="0.7"/>

  <!-- Play triangle -->
  <polygon points="11,8.5 24,16 11,23.5" fill="url(#play)"/>
</svg>
